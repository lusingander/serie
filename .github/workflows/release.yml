name: Release
  
on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        targets:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.targets.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup
        run: rustup target add ${{ matrix.targets.target }}
      - name: Build
        uses: houseabsolute/actions-rust-cross@v1.0.6
        with:
          command: build
          target: ${{ matrix.targets.target }}
          args: "--release"
      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> ${GITHUB_ENV}
      - name: Archive
        run: tar -czf serie-${{ env.RELEASE_VERSION }}-${{ matrix.targets.target }}.tar.gz -C target/${{ matrix.targets.target }}/release serie
      - name: Checksum
        run: shasum -a 256 serie-${{ env.RELEASE_VERSION }}-${{ matrix.targets.target }}.tar.gz
      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.targets.target }}
          path: serie-${{ env.RELEASE_VERSION }}-${{ matrix.targets.target }}.tar.gz
          if-no-files-found: error
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          path: releases
          pattern: release-*
          merge-multiple: true
      - name: Checksum
        run: sha256sum releases/* > ./releases/checksum.txt
      - name: Create Draft Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          draft: true
          generate_release_notes: true
          make_latest: true
          files: |
            releases/*
